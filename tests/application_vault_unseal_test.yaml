suite: Test unsealVaultJob
templates:
  - templates/imperative/unsealjob.yaml
release:
  name: release-test
tests:
  - it: should not output an unsealjob by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the unsealVault job when the application dict has hashicorp-vault but when isHubCluster is false
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: false
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
            ignoreDifferences:
              - group: internal.open-cluster-management.io
                kind: ManagedClusterInfo
                jsonPointers:
                  - /spec/loggingCA
          vault:
            name: vault
            namespace: vault
            project: hub
            chart: hashicorp-vault
            chartVersion: 0.1.*
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1

  - it: should render the unsealVault job when the application dict does not have the hashicorp-vault but when isHubCluster is true
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: true
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
            ignoreDifferences:
              - group: internal.open-cluster-management.io
                kind: ManagedClusterInfo
                jsonPointers:
                  - /spec/loggingCA
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1

  - it: should render the unsealVault job when the application dict has hashicorp-vault but when isHubCluster is true
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: false
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
            ignoreDifferences:
              - group: internal.open-cluster-management.io
                kind: ManagedClusterInfo
                jsonPointers:
                  - /spec/loggingCA
          vault:
            name: vault
            namespace: vault
            project: hub
            chart: hashicorp-vault
            chartVersion: 0.1.*
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1

  - it: should not render the unsealVault job when the application dict does not have hashicorp-vault and when isHubCluster is false
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: false
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
            ignoreDifferences:
              - group: internal.open-cluster-management.io
                kind: ManagedClusterInfo
                jsonPointers:
                  - /spec/loggingCA
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the unsealVault job when the application list has hashicorp-vault but when isHubCluster is false
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: false
        applications:
          - name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
            ignoreDifferences:
              - group: internal.open-cluster-management.io
                kind: ManagedClusterInfo
                jsonPointers:
                  - /spec/loggingCA
          - name: vault
            namespace: vault
            project: hub
            chart: hashicorp-vault
            chartVersion: 0.1.*
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1

  - it: should not render the unsealVault job when the application obj is unset and when isHubCluster is false
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include ansible dev mode init container when enabled
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: true
        imperative:
          ansibleDevMode:
            enabled: true
            requirementsFile: dev/requirements.yml
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[2].name
          value: ansible-dev-mode
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[2].command[2]
          value: ansible-galaxy collection install -r "dev/requirements.yml"

  - it: should inject ansible.cfg in unseal ansible dev mode init when ansibleCfgContent is set
    set:
      global:
        repoURL: https://github.com/validatedpatterns/multicloud-gitops
        multiSourceRepoUrl: https://charts.validatedpatterns.io
      clusterGroup:
        isHubCluster: true
        imperative:
          ansibleDevMode:
            enabled: true
            requirementsFile: dev/requirements.yml
            ansibleCfgFile: dev/imperative-ansible.cfg
            ansibleCfgContent: |
              [defaults]
              collections_path=~/.ansible/collections:/usr/share/ansible/collections
        applications:
          acm:
            name: acm
            namespace: open-cluster-management
            project: hub
            chart: acm
            chartVersion: 0.1.*
    asserts:
      - isKind:
          of: CronJob
      - hasDocuments:
          count: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[2].name
          value: ansible-dev-mode
      - matchRegex:
          path: spec.jobTemplate.spec.template.spec.initContainers[2].command[2]
          pattern: 'cat <<''EOF'' > "dev/imperative-ansible.cfg"'
      - matchRegex:
          path: spec.jobTemplate.spec.template.spec.initContainers[2].command[2]
          pattern: 'ansible-galaxy collection install -r "dev/requirements.yml"'
