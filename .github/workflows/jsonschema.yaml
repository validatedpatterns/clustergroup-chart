---
name: Verify json schema
on: [push, pull_request]

permissions: read-all # zizmor: ignore[excessive-permissions]

jobs:
  jsonschema_tests:
    name: Json Schema tests
    strategy:
      matrix:
        python-version: [3.11.3]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install check-jsonschema

      - name: Verify ClusterGroup values.schema.json
        run: |
          check-jsonschema --schemafile ./values.schema.json \
            "values.yaml" \
            "tests/fixtures/values-cluster-group-schema.yaml"
